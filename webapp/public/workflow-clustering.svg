<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="700" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="700" rx="28" fill="url(#bg)"/>

  <!-- Cluster hulls -->
  <ellipse cx="290" cy="250" rx="170" ry="130" fill="#DBEAFE"/>
  <ellipse cx="610" cy="450" rx="190" ry="140" fill="#DCFCE7"/>
  <ellipse cx="910" cy="250" rx="170" ry="130" fill="#FCE7F3"/>

  <!-- Connecting context lines -->
  <path d="M320 250L520 430" stroke="#94A3B8" stroke-width="3" stroke-dasharray="8 10"/>
  <path d="M700 430L840 280" stroke="#94A3B8" stroke-width="3" stroke-dasharray="8 10"/>

  <!-- Cluster 1 points -->
  <g filter="url(#shadow)">
    <circle cx="220" cy="220" r="16" fill="#2563EB"/>
    <circle cx="300" cy="180" r="14" fill="#3B82F6"/>
    <circle cx="360" cy="250" r="18" fill="#1D4ED8"/>
    <circle cx="270" cy="290" r="12" fill="#60A5FA"/>
    <circle cx="200" cy="280" r="11" fill="#3B82F6"/>
    <circle cx="340" cy="320" r="13" fill="#2563EB"/>
  </g>

  <!-- Cluster 2 points -->
  <g filter="url(#shadow)">
    <circle cx="540" cy="410" r="14" fill="#16A34A"/>
    <circle cx="620" cy="370" r="16" fill="#22C55E"/>
    <circle cx="700" cy="440" r="18" fill="#15803D"/>
    <circle cx="560" cy="500" r="12" fill="#4ADE80"/>
    <circle cx="640" cy="520" r="11" fill="#22C55E"/>
    <circle cx="730" cy="500" r="13" fill="#16A34A"/>
  </g>

  <!-- Cluster 3 points -->
  <g filter="url(#shadow)">
    <circle cx="850" cy="210" r="14" fill="#DB2777"/>
    <circle cx="930" cy="180" r="12" fill="#EC4899"/>
    <circle cx="980" cy="260" r="18" fill="#BE185D"/>
    <circle cx="880" cy="300" r="12" fill="#F472B6"/>
    <circle cx="1020" cy="220" r="11" fill="#EC4899"/>
    <circle cx="930" cy="320" r="13" fill="#DB2777"/>
  </g>

  <!-- Centroids -->
  <g>
    <circle cx="285" cy="250" r="26" fill="#1E293B"/>
    <text x="285" y="256" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#F8FAFC">C1</text>
    <circle cx="620" cy="445" r="26" fill="#1E293B"/>
    <text x="620" y="451" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#F8FAFC">C2</text>
    <circle cx="920" cy="250" r="26" fill="#1E293B"/>
    <text x="920" y="256" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#F8FAFC">C3</text>
  </g>

  <!-- Labels -->
  <rect x="40" y="46" width="360" height="62" rx="12" fill="white" fill-opacity="0.85"/>
  <text x="64" y="84" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1E293B">
    Clustering &amp; Grouping
  </text>

  <rect x="40" y="598" width="760" height="58" rx="12" fill="white" fill-opacity="0.85"/>
  <text x="64" y="634" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#334155">
    Facilities are grouped by similar service profiles into care-bundle tiers
  </text>
</svg>
