# Render.com Blueprint — free Web Service
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: bha-navigator
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 backend.app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: GEMINI_API_KEY
        sync: false
